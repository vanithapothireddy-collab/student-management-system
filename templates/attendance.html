<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance Management</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>SMS</h2>

        <a href="/">🏠 Dashboard</a>
        <a href="/students.html">👨‍🎓 Students</a>
        <a href="/departments.html">🏢 Departments</a>
        <a href="/subjects.html">📚 Subjects</a>
        <a href="/batches.html">🎓 Batches</a>
        <a href="/attendance.html">📝 Attendance</a>
        <a href="/exams.html">🧪 Exams</a>
        <a href="/marks.html">📊 Marks</a>
        <a href="/fees.html">💰 Fees</a>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="navbar">

            <h1>Attendance Management</h1>

        </div>

        <div class="content">

            <h2>Attendance</h2>

            <button id="addAttendanceBtn">

                + Mark Attendance

            </button>

            <br><br>

            <div id="attendanceForm" style="display:none;" class="card">

                <h3>Mark Attendance</h3>

                <label>Student</label>

                <select id="student_id">

                    <option value="">Select Student</option>

                </select>

                <br><br>

                <label>Subject</label>

                <select id="subject_id">

                    <option value="">Select Subject</option>

                </select>

                <br><br>

                <label>Date</label>

                <input
                    type="date"
                    id="attendance_date">

                <br><br>

                <label>Status</label>

                <select id="status">

                    <option value="Present">Present</option>

                    <option value="Absent">Absent</option>

                </select>

                <br><br>

                <button
                    id="saveBtn"
                    onclick="saveAttendance()">

                    Save Attendance

                </button>

            </div>

            <br>
            <div class="toolbar">

    <input
        type="text"
        id="searchBox"
        placeholder="Search Student">

    <button onclick="searchAttendance()">
        Search
    </button>

</div>

<br>
            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Student</th>

                        <th>Subject</th>

                        <th>Date</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="attendanceTable">

                </tbody>

            </table>

        </div>

    </div>

</div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/attendance.js"></script>

</body>

</html>
