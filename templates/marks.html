<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Marks Management</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>SMS</h2>

<a href="/">🏠 Dashboard</a>
<a href="/students.html">👨‍🎓 Students</a>
<a href="/departments.html">🏢 Departments</a>
<a href="/subjects.html">📚 Subjects</a>
<a href="/batches.html">🎓 Batches</a>
<a href="/attendance.html">📝 Attendance</a>
<a href="/marks.html">📊 Marks</a>
<a href="/fees.html">💰 Fees</a>

</div>

<div class="main">

<div class="navbar">

<h1>Marks Management</h1>

</div>

<div class="content">

<h2>Marks</h2>

<button id="addMarkBtn">

+ Add Marks

</button>

<br><br>

<div id="markForm" style="display:none;" class="card">

<h3>Add Marks</h3>

<select id="student_id">

<option value="">Select Student</option>

</select>

<br><br>

<select id="exam_id">

<option value="">Select Exam</option>

</select>

<br><br>
<input
type="text"
id="searchBox"
placeholder="Search Student">

<button onclick="searchMarks()">

Search

</button>

<br><br>
<input
type="number"
id="marks_obtained"
placeholder="Marks">

<br><br>

<button
id="saveBtn"
onclick="saveMark()">

Save Marks

</button>

</div>

<br>

<table>

<thead>

<tr>

<th>ID</th>

<th>Student</th>

<th>Exam</th>

<th>Marks</th>

<th>Grade</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="marksTable">

</tbody>

</table>

</div>

</div>

</div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/marks.js"></script>

</body>

</html>
