<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>SMS</h2>

        <a href="/">🏠 Dashboard</a>
        <a href="/students.html">👨‍🎓 Students</a>
        <a href="/departments.html">🏢 Departments</a>
        <a href="/subjects.html">📚 Subjects</a>
        <a href="/teachers.html">👨‍🏫 Teachers</a>
        <a href="/attendance.html">📝 Attendance</a>
        <a href="/exams.html">🧪 Exams</a>
        <a href="/marks.html">📊 Marks</a>
        <a href="/fees.html">💰 Fees</a>
        <a href="/reports.html">📈 Reports</a>

    </div>

    <div class="main">

        <div class="navbar">
            <h1>Teacher Management</h1>
        </div>
        <div class="cards">

    <div class="card">
        <h3>Total Teachers</h3>
        <h1 id="totalTeachers">0</h1>
    </div>

    <div class="card">
        <h3>Total Subjects Assigned</h3>
        <h1 id="assignedSubjects">0</h1>
    </div>

</div>

<hr>
        <div class="content">

            <input type="hidden" id="teacher_id">

            <label>Teacher Name</label>
            <input type="text" id="teacher_name">

            <br><br>

            <label>Subject</label>
            <select id="subject_name"></select>

            <br><br>

            <label>Email</label>
            <input type="email" id="email">

            <br><br>

            <button onclick="saveTeacher()">Save</button>

            <button onclick="updateTeacher()">Update</button>

            <button onclick="clearForm()">Clear</button>

            <hr>

            <input
                type="text"
                id="searchTeacher"
                placeholder="Search Teacher">

            <button onclick="searchTeacher()">
                Search
            </button>

            <br><br>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Teacher</th>
                        <th>Subject</th>
                        <th>Email</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="teacherTable">

                </tbody>

            </table>

        </div>

    </div>

</div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/teachers.js"></script>
</body>

</html>
