<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Batch Management</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>SMS</h2>

        <a href="/">🏠 Dashboard</a>
        <a href="/students.html">👨‍🎓 Students</a>
        <a href="/departments.html">🏢 Departments</a>
        <a href="/subjects.html">📚 Subjects</a>
        <a href="/batches.html">🎓 Batches</a>
        <a href="/attendance.html">📝 Attendance</a>
        <a href="/exams.html">🧪 Exams</a>
        <a href="/marks.html">📊 Marks</a>
        <a href="/fees.html">💰 Fees</a>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="navbar">

            <h1>Batch Management</h1>

        </div>

        <div class="content">

            <h2>Batches</h2>

            <div class="toolbar">

                <input
                    type="text"
                    id="searchBox"
                    placeholder="Search Batch">

                <button onclick="searchBatch()">
                    Search
                </button>

                <button id="addBatchBtn">
                    + Add Batch
                </button>

            </div>

            <div id="batchForm" style="display:none;" class="card">

                <h3>Add Batch</h3>

                <input
                    type="text"
                    id="batch_name"
                    placeholder="Batch Name">

                <input
                    type="number"
                    id="year"
                    placeholder="Year">

                <button
                    id="saveBtn"
                    onclick="saveBatch()">

                    Save Batch

                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Batch Name</th>
                        <th>Year</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="batchTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="/static/js/batches.js"></script>

</body>

</html>
